name: Build V-Viewer APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Setup NDK
      run: sdkmanager "ndk;26.1.10909125"
    
    - name: Build Release APK
      run: gradle assembleRelease
    
    - name: Generate Keystore and Sign APK
      run: |
        keytool -genkey -v -keystore vviewer.keystore -alias vviewer -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Unknown, OU=Unknown, O=Unknown, L=Unknown, ST=Unknown, C=Unknown"
        jarsigner -verbose -sigalg SHA1withRSA -digestalg SHA1 -keystore vviewer.keystore -storepass android -keypass android app/build/outputs/apk/release/app-release-unsigned.apk vviewer
        /usr/local/lib/android/sdk/build-tools/34.0.0/zipalign -v 4 app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/V-Viewer-Signed.apk
    
    - name: Upload Signed APK
      uses: actions/upload-artifact@v4
      with:
        name: V-Viewer-APK
        path: app/build/outputs/apk/release/V-Viewer-Signed.apk
    
    - name: Upload Build Log
      uses: actions/upload-artifact@v4
      with:
        name: Build-Log
        path: build-log.txt
      if: always()
